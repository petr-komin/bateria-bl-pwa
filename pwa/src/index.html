<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BLE Teplomer</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header>
      <h1>ESP32 Teplomer</h1>
      <div id="status" class="status disconnected">Odpojeno</div>
    </header>

    <main>
      <div class="temp-display">
        <div id="temperature" class="temperature">--.-</div>
        <div class="unit">°C</div>
      </div>
      <div id="rssi-display" class="rssi-display">
        <svg id="rssi-icon" class="rssi-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect id="bar1" x="2" y="18" width="4" height="3" rx="1"/>
          <rect id="bar2" x="8" y="13" width="4" height="8" rx="1"/>
          <rect id="bar3" x="14" y="8" width="4" height="13" rx="1"/>
          <rect id="bar4" x="20" y="3" width="4" height="18" rx="1"/>
        </svg>
        <span id="rssi-value" class="rssi-value">-- dBm</span>
      </div>
      <div id="last-update" class="last-update"></div>
    </main>

    <footer>
      <button id="btn-connect" class="btn-connect">Pripojit</button>
    </footer>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
